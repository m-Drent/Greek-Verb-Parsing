<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Greek Verb Parser</title>
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Gentium Plus', serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 900px; text-align: center; }
        
        .greek-word { font-size: 4.5rem; margin-bottom: 20px; color: #1a3a5f; min-height: 100px; }
        
        .parsing-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 30px; }
        .column-label { font-size: 0.7rem; font-weight: bold; color: #7f8c8d; text-transform: uppercase; margin-bottom: 8px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 4px; }
        .choice-btn { 
            padding: 6px 2px; border: 1px solid #dcdde1; border-radius: 4px; 
            background: white; cursor: pointer; font-size: 0.85rem; transition: 0.15s;
        }
        .choice-btn.selected { background: #2980b9; color: white; border-color: #1c5982; }

        .controls { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-check { background: #27ae60; color: white; border: none; padding: 12px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; }
        .btn-next { background: #ecf0f1; color: #34495e; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        
        #feedback { margin: 15px 0; font-size: 1.2rem; font-weight: bold; min-height: 1.5em; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="word-display" class="greek-word">---</div>
    <div id="feedback"></div>

    <div class="parsing-grid">
        <div class="btn-group" data-category="t">
            <div class="column-label">Tense</div>
            <button class="choice-btn" onclick="select(this, 'Pres')">Pres</button>
            <button class="choice-btn" onclick="select(this, 'Imp')">Imp</button>
            <button class="choice-btn" onclick="select(this, 'Fut')">Fut</button>
            <button class="choice-btn" onclick="select(this, 'Aor')">Aor</button>
            <button class="choice-btn" onclick="select(this, 'Perf')">Perf</button>
        </div>

        <div class="btn-group" data-category="v">
            <div class="column-label">Voice</div>
            <button class="choice-btn" onclick="select(this, 'Act')">Act</button>
            <button class="choice-btn" onclick="select(this, 'Mid')">Mid</button>
            <button class="choice-btn" onclick="select(this, 'Pass')">Pass</button>
        </div>

        <div class="btn-group" data-category="m">
            <div class="column-label">Mood</div>
            <button class="choice-btn" onclick="select(this, 'Ind')">Ind</button>
            <button class="choice-btn" onclick="select(this, 'Subj')">Subj</button>
            <button class="choice-btn" onclick="select(this, 'Opt')">Opt</button>
            <button class="choice-btn" onclick="select(this, 'Imp')">Imp</button>
            <button class="choice-btn" onclick="select(this, 'Inf')">Inf</button>
        </div>

        <div class="btn-group" data-category="p">
            <div class="column-label">Person</div>
            <button class="choice-btn" onclick="select(this, '1')">1st</button>
            <button class="choice-btn" onclick="select(this, '2')">2nd</button>
            <button class="choice-btn" onclick="select(this, '3')">3rd</button>
        </div>

        <div class="btn-group" data-category="n">
            <div class="column-label">Number</div>
            <button class="choice-btn" onclick="select(this, 's')">Sing</button>
            <button class="choice-btn" onclick="select(this, 'p')">Plur</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn-check" onclick="checkParsing()">Check Answer</button>
        <button class="btn-next" onclick="loadNext()">Next Verb</button>
    </div>
</div>

<script>
    // Example Greek Verbs
    const verbs = [
        { text: "λύομεν", t: "Pres", v: "Act", m: "Ind", p: "1", n: "p" },
        { text: "ἐλύσατο", t: "Aor", v: "Mid", m: "Ind", p: "3", n: "s" },
        { text: "λυθήσονται", t: "Fut", v: "Pass", m: "Ind", p: "3", n: "p" }
    ];

    let currentVerb = null;
    let userSelection = { t: "", v: "", m: "", p: "", n: "" };

    function select(element, value) {
        const group = element.parentElement;
        const category = group.getAttribute('data-category');
        group.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('selected'));
        element.classList.add('selected');
        userSelection[category] = value;
    }

    function loadNext() {
        document.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('selected'));
        userSelection = { t: "", v: "", m: "", p: "", n: "" };
        document.getElementById('feedback').innerHTML = "";
        currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
        document.getElementById('word-display').innerText = currentVerb.text;
    }

    function checkParsing() {
        const cats = ['t', 'v', 'm', 'p', 'n'];
        let score = 0;
        cats.forEach(c => { if (userSelection[c] === currentVerb[c]) score++; });

        const feedback = document.getElementById('feedback');
        if (score === 5) {
            feedback.innerHTML = "<span class='success'>Correct! 🏛️</span>";
        } else {
            feedback.innerHTML = `<span class='error'>${score}/5 Correct</span>`;
        }
    }

    loadNext();
</script>
</body>
</html>
